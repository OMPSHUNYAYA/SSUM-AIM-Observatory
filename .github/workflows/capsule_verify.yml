name: Capsule Verification

on:
  push:
    branches: [ "main" ]
    paths:
      - "0*_*/**"
      - ".github/workflows/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "0*_*/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  verify_all_capsules:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify + Replay all capsules
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "=== SSUM-AIM Observatory: Capsule Verification ==="
          Write-Host "Repo root: $PWD"

          # Discover capsule directories like 01_*, 02_*, ...
          $capsules = Get-ChildItem -Path $PWD -Directory | Where-Object { $_.Name -match '^\d{2}_.+' } | Sort-Object Name

          if (-not $capsules -or $capsules.Count -eq 0) {
            throw "No capsule folders found at repo root (expected folders like 01_*, 02_*, ...)."
          }

          foreach ($c in $capsules) {
            Write-Host ""
            Write-Host "=== Capsule: $($c.Name) ==="

            $verify = Get-ChildItem -Path $c.FullName -Filter "VERIFY_*.cmd" -File | Select-Object -First 1
            $replay = Get-ChildItem -Path $c.FullName -Filter "REPLAY_*.cmd" -File | Select-Object -First 1

            if (-not $verify) { throw "Missing VERIFY_*.cmd in $($c.Name)" }
            if (-not $replay) { throw "Missing REPLAY_*.cmd in $($c.Name)" }

            Push-Location $c.FullName

            Write-Host ("--- Running VERIFY: {0} ---" -f $verify.Name)
            cmd /c ".\$($verify.Name)"

            Write-Host ("--- Running REPLAY: {0} ---" -f $replay.Name)
            cmd /c ".\$($replay.Name)"

            Pop-Location
          }

          Write-Host ""
          Write-Host "=== OVERALL STATUS: PASS ==="
